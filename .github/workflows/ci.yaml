# This is a CI pipeline for github actions

name: "Terraform CI"

on:
  push:
    # Triggers on any commit pushed to any branch
    paths:
      - "**/*.tf"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest

    env:
      AWS_REGION: "us-east-1"
      TF_LOG: INFO

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "AWS creds - OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::514005485562:role/GitHubActionsTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: "Terraform FMT"
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: "Terraform init"
        id: init
        run: terraform init

      - name: "Terraform validate"
        id: validate
        run: terraform validate -no-color

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: "Update Pull Request with Plan"
        uses: actions/github-script@v7
        # This step will gracefully skip if the run was triggered by a direct push instead of a PR
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
