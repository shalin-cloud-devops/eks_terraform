# This is a CI pipeline for github actions

name: "Terraform CI"

on:
  push:
    paths:
      - "**/*.tf"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - ".github/workflows/**"

  workflow_dispatch:
    inputs: # <-- Correctly indented
      destroy:
        description: "Destroy Infrastructure?"
        type: boolean
        required: true
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest

    env:
      AWS_REGION: "us-east-1"
      TF_LOG: INFO

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "AWS creds - OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::514005485562:role/GitHubActionsTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: "Terraform FMT"
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: "Terraform init"
        id: init
        run: terraform init

      - name: "Terraform validate"
        id: validate
        run: terraform validate -no-color

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: "terraform plan upload"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

      - name: "Update Pull Request with Plan"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    # <-- MOVED UP HERE (Job-level configuration)
    environment: production

    env:
      AWS_REGION: "us-east-1"
      TF_LOG: INFO

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "AWS creds - OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::514005485562:role/GitHubActionsTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: "Download Terraform Plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: "Terraform init"
        id: init
        run: terraform init

      - name: "Terraform Apply or Destroy"
        run: |
          # Default to apply unless manually triggered with 'destroy=true'
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.destroy }}" == "true" ]; then
            echo "Destroying infrastructure..."
            terraform destroy -auto-approve -input=false
          else
            echo "Applying infrastructure..."
            terraform apply -input=false -no-color tfplan
          fi
